<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Fábrica - Latas Enlozadas | TMC</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <header class="compact-header">
            <div class="header-left">
                <img src="logo_tmc.png" alt="TMC">
                <h1>Fábrica · Loza</h1>
            </div>
            <div id="active-cage-bubble" class="cage-bubble" onclick="switchTab('llenado')" style="display:none;">
                📦 Jaula #...
            </div>
        </header>

        <main class="main-content">
            <!-- TAB 1: FABRICA (Alta Producción) -->
            <div id="view-fabrica" class="tab-pane active">
                <div class="col">
                    <div class="col-header"><span>🏗️ Alta Producción</span></div>
                    <div class="col-body">
                        <div class="form-group">
                            <label class="form-label">Artículo</label>
                            <div class="dropdown-wrapper">
                                <input type="text" id="alta-sku-search" class="form-control" placeholder="Buscar SKU..." onfocus="filterAltaArticles()" oninput="filterAltaArticles()">
                                <div id="alta-sku-results" class="search-results-dropdown" style="display:none;"></div>
                                <input type="hidden" id="alta-mate-id">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Cantidad</label>
                            <input type="number" id="alta-qty" class="form-control" placeholder="0">
                        </div>
                        <button class="btn btn-primary w-100" onclick="registrarProduccion()">⚡ Registrar Alta</button>
                        
                        <div class="recent-activity">
                            <div class="flex-between">
                                <h4>REGISTROS RECIENTES</h4>
                                <button class="btn-icon" onclick="fetchAltasRecientes()">🔄</button>
                            </div>
                            <div id="alta-recent-list" class="mini-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 2: JAULAS (Gestión y Apertura) -->
            <div id="view-jaulas" class="tab-pane">
                <div class="col">
                    <div class="col-header">
                        <span>📦 Jaulas Abiertas</span>
                        <button class="btn btn-primary btn-sm" onclick="crearNuevoRemito()">+ NUEVA</button>
                    </div>
                    <div class="col-body">
                        <div id="remito-list"></div>
                    </div>
                </div>
            </div>

            <!-- TAB 3: LLENADO (Acción de Carga) -->
            <div id="view-llenado" class="tab-pane">
                <div class="col">
                    <div class="col-header">
                        <span>📥 Llenado de Jaula</span>
                    </div>
                    <div class="col-body">
                        <!-- Buscador de Stock -->
                        <div class="form-group">
                            <input type="text" id="search-stock" class="form-control" placeholder="🔍 Buscar para cargar..." oninput="filtrarStock()">
                        </div>
                        <div id="stock-list" class="stock-mini-grid"></div>

                        <!-- Detalle de Carga -->
                        <div id="detail-panel" class="detail-card" style="display:none;">
                            <div id="remito-items" class="items-mini-list"></div>
                            <div class="detail-actions">
                                <button class="btn btn-success w-100" onclick="guardarItemsEnYiqi()">💾 GUARDAR EN YIQI</button>
                            </div>
                        </div>
                        <div id="empty-state" class="empty-msg">
                            <p>Seleccioná una jaula para cargar ítems.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('fabrica')" id="nav-fabrica">
                <span class="nav-icon">🏗️</span>
                <span class="nav-label">Fábrica</span>
            </button>
            <button class="nav-item" onclick="switchTab('jaulas')" id="nav-jaulas">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Jaulas</span>
            </button>
            <button class="nav-item" onclick="switchTab('llenado')" id="nav-llenado">
                <span class="nav-icon">📥</span>
                <span class="nav-label">Llenado</span>
            </button>
        </nav>
    </div>

    <div id="loading-overlay">
        <div style="text-align:center;">
            <div style="font-size: 2rem;">⏳</div>
            <p>Procesando...</p>
        </div>
    </div>

    <!-- Custom Modal Structure -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <span id="modal-icon" class="modal-icon">✨</span>
            <div id="modal-title" class="modal-title">Título</div>
            <div id="modal-message" class="modal-message">Mensaje aquí</div>
            <div id="modal-actions" class="modal-actions">
                <!-- Buttons injected via JS -->
            </div>
        </div>
    </div>

    <div id="app-footer">Esperando acciones...</div>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="logica.js"></script>
</body>

</html>
