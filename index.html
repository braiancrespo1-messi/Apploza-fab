<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fábrica - Latas Enlozadas | TMC</title>
    <link rel="stylesheet" href="estilos.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

    <div class="app-container">
        <!-- HEADER COMPACTO -->
        <header class="compact-header">
            <div class="header-left">
                <img src="logo_tmc.png" alt="TMC">
                <h1>Fábrica · Loza</h1>
            </div>
            <div id="active-cage-bubble" class="cage-bubble" onclick="switchTab('llenado')" style="display:none;">
                📦 Jaula #...
            </div>
        </header>

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">

            <!-- TAB 1: FABRICA -->
            <div id="view-fabrica" class="tab-pane active">
                <div class="col">
                    <div class="col-header"><span>🏗️ Alta Producción</span></div>
                    <div class="col-body">
                        <div class="form-group mb-3">
                            <label class="form-label">Artículo</label>
                            <div id="sku-selector-trigger" class="premium-select" onclick="openSkuSelector()">
                                <span id="selected-sku-text">Seleccione artículo...</span>
                                <span class="select-chevron">🔍</span>
                            </div>
                            <input type="hidden" id="alta-mate-id">
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label">Cantidad</label>
                            <input type="number" id="alta-qty" class="form-control" placeholder="0" inputmode="numeric">
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label">Observaciones (Opcional)</label>
                            <input type="text" id="alta-obs" class="form-control" placeholder="...">
                        </div>
                        <button type="button" class="btn btn-primary w-100" onclick="registrarProduccion()">⚡ Registrar Alta</button>
                        
                        <div class="recent-activity">
                            <div class="flex-between">
                                <h4>REGISTROS RECIENTES</h4>
                                <button class="btn-icon" onclick="fetchAltasRecientes()">🔄</button>
                            </div>
                            <div id="alta-recent-list" class="mini-list"></div>
                        </div>

                        <div class="recent-activity" style="border-top: 1px solid #fed7aa; background: #fffaf0; margin: 10px -10px -10px -10px; padding: 10px;">
                            <div class="flex-between">
                                <h4 style="color: #c2410c;"><span class="pulse-warning">⚠️</span> ALTAS PENDIENTES</h4>
                                <div style="display: flex; gap: 8px;">
                                    <button class="btn-icon" onclick="fetchAltasPendientes()" title="Refrescar Pendientes">🔄</button>
                                    <button class="btn-icon" onclick="procesarAltasPendientes()" title="Procesar Todo Manualmente" style="background: #ffedd5; border-radius: 4px;">⚡</button>
                                </div>
                            </div>
                            <div id="alta-pendientes-list" class="mini-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 2: JAULAS -->
            <div id="view-jaulas" class="tab-pane">
                <div class="col">
                    <div class="col-header">
                        <span>📦 Jaulas Abiertas</span>
                        <button class="btn btn-primary btn-sm" onclick="crearNuevoRemito()">+ NUEVA</button>
                    </div>
                    <div class="col-body">
                        <div id="remito-list"></div>
                    </div>
                </div>
            </div>

            <!-- TAB 3: LLENADO -->
            <div id="view-llenado" class="tab-pane">
                <div class="col">
                    <div class="col-header">
                        <span>📥 Llenado</span>
                        <span id="llenado-jaula-num" style="font-size:0.75rem; color:var(--text-muted);">Sin jaula</span>
                    </div>
                    <!-- Indicador grande de qué jaula estás llenando -->
                    <div id="llenado-indicator" class="jaula-indicator">
                        📦 Cargando en: Jaula #...
                    </div>
                    <div class="col-body">
                        <!-- Buscador de Stock -->
                        <div class="form-group" style="margin-bottom:6px;">
                            <input type="text" id="search-stock" class="form-control" placeholder="🔍 Buscar para cargar..." oninput="filtrarStock()">
                        </div>
                        <div id="stock-list" class="stock-mini-grid"></div>

                        <!-- Detalle de Carga -->
                        <div id="detail-panel" class="detail-card" style="display:none;">
                            <div id="remito-items" class="items-mini-list"></div>
                            <div class="detail-actions">
                                <button class="btn btn-success w-100" onclick="guardarItemsEnYiqi()">💾 GUARDAR EN YIQI</button>
                            </div>
                        </div>
                        <div id="empty-state" class="empty-msg">
                            <p>Seleccioná una jaula en la solapa 📦 para cargar ítems.</p>
                        </div>
                    </div>
                </div>
            </div>

        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('fabrica')" id="nav-fabrica">
                <span class="nav-icon">🏗️</span>
                <span class="nav-label">Fábrica</span>
            </button>
            <button class="nav-item" onclick="switchTab('jaulas')" id="nav-jaulas">
                <span class="nav-icon">📦</span>
                <span class="nav-label">Jaulas</span>
            </button>
            <button class="nav-item" onclick="switchTab('llenado')" id="nav-llenado">
                <span class="nav-icon">📥</span>
                <span class="nav-label">Llenado</span>
            </button>
        </nav>
    </div>

    <!-- LOADING OVERLAY (hidden by default) -->
    <!-- Premium SKU Selector Overlay -->
    <div id="sku-selector-overlay" class="modal-overlay">
        <div class="sku-selector-content">
            <div class="sku-selector-header">
                <button class="btn-icon" onclick="closeSkuSelector()">✕</button>
                <input type="text" id="sku-selector-search" placeholder="Buscar artículo..." oninput="filterSkuSelector()">
            </div>
            <div id="sku-selector-list" class="sku-selector-list">
                <!-- Items via JS -->
            </div>
        </div>
    </div>

    <div id="loading-overlay">
        <div style="text-align:center;">
            <div style="font-size: 2rem;">⏳</div>
            <p>Procesando...</p>
        </div>
    </div>

    <!-- MODAL -->
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <span id="modal-icon" class="modal-icon">✨</span>
            <div id="modal-title" class="modal-title">Título</div>
            <div id="modal-message" class="modal-message">Mensaje aquí</div>
            <div id="modal-actions" class="modal-actions"></div>
        </div>
    </div>

    <!-- Footer oculto (usado internamente por JS) -->
    <div id="app-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="logica.js"></script>
</body>

</html>
